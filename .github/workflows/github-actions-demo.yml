name: GitHub Action Demo
run-name: ${{ github.actor }} is testing your GitHub Actions
on: [push]
jobs:
  Explore-Github-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "The job was automatically triggred by a ${{github.event_name}} name."
      - run: echo "This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "The name of your branch is ${{ github.ref }} and your repo is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v6
      - run: echo "The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "The workflow is now ready to test your code on runner."
      - name: List files in the repository
        run: |
         ls ${{ github.workspace }}
      - run: echo "The Job Status id ${{ github.status }}."
